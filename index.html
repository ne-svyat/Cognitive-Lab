<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.7 Hybrid System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 20px;
    flex-wrap: wrap;
}

.cell {
    width: 170px;
    min-height: 120px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 40px;
    text-align: center;
    color: #ffcc00;
}
</style>

</head>

<body>

<div id="core">CORE: Hybrid Cognitive Graph v0.7</div>
<script>

// ===============================
// CORE GRAPH (cleaned version)
// ===============================
let graph = {
    Memory: { activation: 0, links: { Logic: 0.6, Compression: 0.5 } },
    Logic: { activation: 0, links: { Memory: 0.6, Compression: 0.5 } },
    Compression: { activation: 0, links: { Memory: 0.5, Logic: 0.5 } }
};

// ===============================
// EXPERIENCE MEMORY
// ===============================
let memory = [];

// ===============================
// STOPWORDS (noise filter)
// ===============================
const stopwords = new Set([
    "my", "new", "about", "the", "a", "an", "is", "are", "to", "of", "and", "system", "idea", "design"
]);

// ===============================
// NORMALIZATION
// ===============================
function normalize(word) {
    word = word.toLowerCase().trim();

    if (stopwords.has(word)) return null;

    // merge obvious duplicates
    if (word === "logic") return "Logic";
    if (word === "compression" || word === "compress") return "Compression";
    if (word === "memory") return "Memory";

    // cryptography aliasing
    if (word === "cryptography" || word === "encryption" || word === "security") {
        return "Logic";
    }

    return null;
}

// ===============================
// RESET
// ===============================
function reset() {
    for (let n in graph) {
        graph[n].activation = 0;
    }
}

// ===============================
// PROPAGATION
// ===============================
function spread(node, intensity, visited = new Set()) {
    if (intensity < 0.15) return;
    if (visited.has(node)) return;

    visited.add(node);

    graph[node].activation = Math.max(
        graph[node].activation,
        intensity
    );

    for (let target in graph[node].links) {
        spread(target, intensity * graph[node].links[target], visited);
    }
}

// ===============================
// LEARNING (stable strengthening)
// ===============================
function learn(concepts) {
    if (concepts.length < 2) return;

    for (let i = 0; i < concepts.length; i++) {
        for (let j = i + 1; j < concepts.length; j++) {

            let a = concepts[i];
            let b = concepts[j];

            graph[a].links[b] = (graph[a].links[b] || 0.3) + 0.05;
            graph[b].links[a] = (graph[b].links[a] || 0.3) + 0.05;

            // clamp (IMPORTANT stability rule)
            graph[a].links[b] = Math.min(graph[a].links[b], 1.5);
            graph[b].links[a] = Math.min(graph[b].links[a], 1.5);
        }
    }
}

// ===============================
// FORGETTING (noise control)
// ===============================
function decay() {
    for (let n in graph) {
        for (let l in graph[n].links) {

            graph[n].links[l] -= 0.01;

            if (graph[n].links[l] < 0.2) {
                delete graph[n].links[l];
            }
        }
    }
}

// ===============================
// ROUTER (clean semantic extraction)
// ===============================
function run() {
    let text = document.getElementById("query").value.toLowerCase();

    reset();

    let words = text.split(" ");

    let concepts = new Set();

    for (let w of words) {
        let c = normalize(w);
        if (c) concepts.add(c);
    }

    if (concepts.size === 0) {
        concepts.add("Memory");
    }

    let arr = Array.from(concepts);

    // activate
    for (let c of arr) {
        spread(c, 1);
    }

    // memory log
    memory.push({ text, concepts: arr });

    // learning + decay
    learn(arr);
    decay();

    render(text, arr);
}

// ===============================
// RENDER
// ===============================
function render(text, concepts) {
    let out = document.getElementById("output");

    let html = "";

    for (let n in graph) {
        html += `
        <div class="cell" style="
            background: rgba(0,255,200,${graph[n].activation * 0.4});
            transform: scale(${1 + graph[n].activation * 0.2});
        ">
            <div class="title">${n}</div>
            <div class="small">
                activation: ${graph[n].activation.toFixed(2)}<br>
                links: ${Object.keys(graph[n].links).join(", ") || "none"}
            </div>
        </div>
        `;
    }

    out.innerHTML = `
        <div><b>INPUT:</b> ${text}</div>
        <div><b>CONCEPTS:</b> ${concepts.join(", ")}</div>
        <div><b>NODES:</b> ${Object.keys(graph).length}</div>
        <br>
        <div class="container">${html}</div>
    `;
}

</script>
<div id="inputBox">
    <input id="query" placeholder="Ask anything..." />
    <button onclick="run()">Run</button>
</div>

<div class="container">
    <div class="cell">
        <div class="title">Memory</div>
        <div class="small">adaptive storage</div>
    </div>

    <div class="cell">
        <div class="title">Logic</div>
        <div class="small">reasoning layer</div>
    </div>

    <div class="cell">
        <div class="title">Compression</div>
        <div class="small">optimization layer</div>
    </div>
</div>

<div id="output">Waiting for input...</div>



</body>
</html>
