<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Field v0.12.1</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.cell {
    width: 200px;
    min-height: 110px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
}

.title {
    color: #00ffcc;
}

.small {
    font-size: 12px;
    color: #aaa;
}

#graphCanvas {
    display: block;
    margin: 20px auto;
    background: #111;
}
</style>
</head>

<body>

<div id="core">Cognitive Field v0.12.1 — Hybrid Thinking System</div>

<div id="inputBox">
    <input id="query" placeholder="Ask something..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="280"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center;margin-top:15px;"></div>

<script>

// ======================
// CORE NODES
// ======================
let nodes = {
    Memory: { e: 0, bias: 1 },
    Logic: { e: 0, bias: 1 },
    Compression: { e: 0, bias: 1 }
};

let history = [];

// ======================
// CLEAN + MAP
// ======================
function clean(w) {
    w = w.toLowerCase();
    const stop = new Set(["my","new","idea","system","about","the","a","is","are","to","of","and"]);
    if (stop.has(w) || w.length < 3) return null;
    return w;
}

function map(w) {
    if (w.includes("logic") || w.includes("reason") || w.includes("crypt")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";
    if (w.includes("memory") || w.includes("remember")) return "Memory";
    return null;
}

// ======================
// FIELD DYNAMICS
// ======================
function step(active) {

    // spread
    for (let n of active) {
        nodes[n].e += 1 * nodes[n].bias;
    }

    // competition (inhibition)
    for (let a of active) {
        for (let b of active) {
            if (a !== b) nodes[b].e -= 0.2;
        }
    }

    // leakage
    for (let n in nodes) {
        nodes[n].e *= 0.97;
    }
}

// ======================
// STABILITY CHECK
// ======================
function stability() {
    let sum = 0;
    let count = 0;

    for (let n in nodes) {
        sum += Math.abs(nodes[n].e);
        count++;
    }

    return sum / count;
}

// ======================
// MORPHOGENESIS (controlled)
// ======================
function morph() {
    let keys = Object.keys(nodes);

    for (let i = 0; i < keys.length; i++) {
        for (let j = i + 1; j < keys.length; j++) {

            let a = keys[i];
            let b = keys[j];

            if (nodes[a].e > 1.5 && nodes[b].e > 1.5) {
                nodes[a].bias += 0.01;
                nodes[b].bias += 0.01;
            }
        }
    }
}

// ======================
// READOUT LAYER
// ======================
function readout(active, mode) {

    let sorted = Object.keys(nodes)
        .sort((a,b) => nodes[b].e - nodes[a].e);

    let top = sorted.slice(0, 2);

    if (mode === "surface") {
        return `Focus: ${top[0]}`;
    }

    if (mode === "deep") {
        return `System reasoning based on ${top.join(" and ")}, forming structured interpretation.`;
    }

    return `Hybrid state: ${top.join(", ")}`;
}

// ======================
// MODE CONTROLLER
// ======================
function decideMode(stab) {
    if (stab < 0.5) return "surface";
    if (stab > 1.2) return "deep";
    return "hybrid";
}

// ======================
// MAIN RUN
// ======================
function run() {

    let text = document.getElementById("query").value;
    let words = text.split(" ");

    let active = [];

    for (let w of words) {
        let c = clean(w);
        if (!c) continue;
        let m = map(c);
        if (m && !active.includes(m)) active.push(m);
    }

    if (active.length === 0) active = ["Memory"];

    // run 4 cycles (thinking loop)
    for (let i = 0; i < 4; i++) {
        step(active);
        morph();
    }

    let stab = stability();
    let mode = decideMode(stab);

    history.push({ text, active, mode });

    render(active, mode);
    draw();
}

// ======================
// RENDER
// ======================
function render(active, mode) {

    let box = document.getElementById("cells");
    let html = "";

    for (let n in nodes) {

        html += `
        <div class="cell" style="opacity:${Math.min(1, nodes[n].e)}">
            <div class="title">${n}</div>
            <div class="small">
                energy: ${nodes[n].e.toFixed(2)}<br>
                bias: ${nodes[n].bias.toFixed(2)}
            </div>
        </div>
        `;
    }

    document.getElementById("output").innerHTML =
        readout(active, mode) +
        "<br>mode: " + mode +
        "<br>history: " + history.length;

    box.innerHTML = html;
}

// ======================
// DRAW
// ======================
function draw() {
    const c = document.getElementById("graphCanvas");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,800,280);

    let keys = Object.keys(nodes);

    let cx = 400, cy = 140, r = 100;

    keys.forEach((n,i)=>{
        let angle = (i/keys.length)*Math.PI*2;

        let x = cx + Math.cos(angle)*r;
        let y = cy + Math.sin(angle)*r;

        ctx.beginPath();
        ctx.fillStyle = "#00ffcc";
        ctx.arc(x, y, 10 + nodes[n].e*5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, x+10, y);
    });
}

</script>

</body>
</html>
