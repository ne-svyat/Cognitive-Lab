<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.11 — Competitive Field</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

.cell {
    width: 200px;
    min-height: 120px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #333;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    color: #aaa;
    margin-top: 8px;
}

#graphCanvas {
    display: block;
    margin: 30px auto;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="core">CORE: Cognitive Field v0.11 — Competitive Energy System</div>

<div id="inputBox">
    <input id="query" placeholder="Try: cryptography, memory, compression..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="300"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center;margin-top:20px;"></div>

<script>

// =========================
// FIELD NODES (NOT GRAPH)
// =========================
let nodes = {
    Memory: { e: 0, bias: 1.0 },
    Logic: { e: 0, bias: 1.0 },
    Compression: { e: 0, bias: 1.0 }
};

let history = [];

// =========================
// CLEAN INPUT
// =========================
function clean(w) {
    w = w.toLowerCase();

    const stop = new Set([
        "my","new","idea","system","about","the","a","an","is","are","to","of","and"
    ]);

    if (stop.has(w)) return null;
    if (w.length < 3) return null;

    return w;
}

// =========================
// MAP WORD -> NODE
// =========================
function mapConcept(w) {
    if (w.includes("logic") || w.includes("reason") || w.includes("crypt")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";
    if (w.includes("memory") || w.includes("remember")) return "Memory";
    return null;
}

// =========================
// INHIBITION (competition)
// =========================
function inhibit(activeNodes) {
    for (let a of activeNodes) {
        for (let b of activeNodes) {
            if (a !== b) {
                nodes[b].e -= 0.15; // suppression
            }
        }
    }
}

// =========================
// ENERGY SPREAD
// =========================
function spread(activeNodes) {
    for (let n of activeNodes) {
        nodes[n].e += 1.0 * nodes[n].bias;

        // leakage
        nodes[n].e *= 0.98;
    }
}

// =========================
// STABILIZATION STEP
// =========================
function stabilize() {
    for (let n in nodes) {
        if (nodes[n].e < 0) nodes[n].e = 0;
        if (nodes[n].e > 3) nodes[n].e = 3;

        // bias adapts slightly
        nodes[n].bias += (nodes[n].e > 1 ? 0.01 : -0.005);

        if (nodes[n].bias < 0.2) nodes[n].bias = 0.2;
        if (nodes[n].bias > 2.0) nodes[n].bias = 2.0;
    }
}

// =========================
// RUN FIELD DYNAMICS
// =========================
function run() {

    let text = document.getElementById("query").value;
    let words = text.split(" ");

    let concepts = [];

    for (let w of words) {
        let c = clean(w);
        if (!c) continue;

        let mapped = mapConcept(c);
        if (mapped && !concepts.includes(mapped)) {
            concepts.push(mapped);
        }
    }

    if (concepts.length === 0) concepts = ["Memory"];

    // reset field slightly (NOT full reset)
    for (let n in nodes) {
        nodes[n].e *= 0.6;
    }

    // 1. spread activation
    spread(concepts);

    // 2. competition
    inhibit(concepts);

    // 3. stabilization
    stabilize();

    history.push({ text, concepts });

    render(concepts);
    draw();
}

// =========================
// RENDER FIELD
// =========================
function render(concepts) {

    let box = document.getElementById("cells");
    let html = "";

    for (let n in nodes) {

        let e = nodes[n].e;

        if (e < 0.2) continue;

        html += `
        <div class="cell" style="
            background: rgba(0,255,200,${e / 3});
            transform: scale(${1 + e * 0.1});
        ">
            <div class="title">${n}</div>
            <div class="small">
                energy: ${e.toFixed(2)}<br>
                bias: ${nodes[n].bias.toFixed(2)}
            </div>
        </div>
        `;
    }

    document.getElementById("output").innerHTML =
        "ACTIVE CONCEPTS: " + concepts.join(", ") +
        "<br>HISTORY: " + history.length;
}

// =========================
// DRAW FIELD
// =========================
function draw() {
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,800,300);

    let keys = Object.keys(nodes);

    let cx = 400, cy = 150;
    let r = 120;

    keys.forEach((n,i)=>{
        let angle = (i / keys.length) * Math.PI * 2;

        let x = cx + Math.cos(angle)*r;
        let y = cy + Math.sin(angle)*r;

        let e = nodes[n].e;

        ctx.beginPath();
        ctx.fillStyle = "#00ffcc";
        ctx.arc(x, y, 10 + e*5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, x + 10, y);
    });
}

</script>

</body>
</html>
