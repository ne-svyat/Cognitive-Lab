<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Field v0.13 — Dual Mind</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.cell {
    width: 200px;
    min-height: 110px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
}

.title {
    color: #00ffcc;
}

.small {
    font-size: 12px;
    color: #aaa;
}

#graphCanvas {
    display: block;
    margin: 20px auto;
    background: #111;
}
</style>
</head>

<body>

<div id="core">v0.13 — Dual Field Cognitive System</div>

<div id="inputBox">
    <input id="query" placeholder="Try something..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="280"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center;margin-top:15px;"></div>

<script>

// =========================
// CORE NODES
// =========================
let nodes = {
    Memory: { e: 0, bias: 1, val: 0.3 },
    Logic: { e: 0, bias: 1, val: 0.5 },
    Compression: { e: 0, bias: 1, val: 0.4 }
};

let history = [];

// =========================
// CLEAN
// =========================
function clean(w) {
    w = w.toLowerCase();
    const stop = new Set(["my","new","idea","system","about","the","a","is","are","to","of","and"]);
    if (stop.has(w) || w.length < 3) return null;
    return w;
}

// =========================
// MAP
// =========================
function map(w) {
    if (w.includes("logic") || w.includes("reason")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";
    if (w.includes("memory") || w.includes("remember")) return "Memory";
    return null;
}

// =========================
// FIELD A (GENERATOR)
// =========================
function generator(active) {
    for (let n of active) {
        nodes[n].e += 1 * nodes[n].bias;

        // slight positive emotional drift
        nodes[n].val += 0.01;
    }
}

// =========================
// FIELD B (CRITIC — STRONG)
// =========================
function critic(active) {
    for (let a of active) {
        for (let b of active) {
            if (a !== b) {
                nodes[b].e -= 0.35; // stronger suppression
                nodes[b].val -= 0.02;
            }
        }
    }

    // global pruning pressure
    for (let n in nodes) {
        if (nodes[n].e < 0.2) {
            nodes[n].val -= 0.01;
        }
    }
}

// =========================
// VALENCE SYSTEM
// =========================
function valenceUpdate() {
    for (let n in nodes) {

        // clamp
        if (nodes[n].val > 1) nodes[n].val = 1;
        if (nodes[n].val < -1) nodes[n].val = -1;

        // valence affects survival
        if (nodes[n].val < -0.5) {
            nodes[n].e *= 0.9;
        }
    }
}

// =========================
// LEAKAGE (time decay)
// =========================
function decay() {
    for (let n in nodes) {
        nodes[n].e *= 0.96;
    }
}

// =========================
// STABILITY
// =========================
function stability() {
    let sum = 0;
    for (let n in nodes) sum += Math.abs(nodes[n].e);
    return sum / Object.keys(nodes).length;
}

// =========================
// MODE (still hybrid but emergent)
// =========================
function mode(stab) {
    if (stab < 0.4) return "surface";
    if (stab > 1.1) return "deep";
    return "hybrid";
}

// =========================
// READOUT
// =========================
function readout(active, m) {
    let sorted = Object.keys(nodes).sort((a,b)=>nodes[b].e - nodes[a].e);
    let top = sorted.slice(0,2);

    if (m === "surface") return `Focus: ${top[0]}`;
    if (m === "deep") return `Deep synthesis: ${top.join(" + ")}`;
    return `Balanced thought: ${top.join(", ")}`;
}

// =========================
// RUN LOOP
// =========================
function run() {

    let text = document.getElementById("query").value;
    let words = text.split(" ");

    let active = [];

    for (let w of words) {
        let c = clean(w);
        if (!c) continue;
        let m = map(c);
        if (m && !active.includes(m)) active.push(m);
    }

    if (active.length === 0) active = ["Memory"];

    // THINKING LOOP (multiple cycles)
    for (let i = 0; i < 5; i++) {
        generator(active);
        critic(active);
        decay();
        valenceUpdate();
    }

    let stab = stability();
    let m = mode(stab);

    history.push({ text, active, m });

    render(active, m);
    draw();
}

// =========================
// RENDER
// =========================
function render(active, m) {

    let box = document.getElementById("cells");
    let html = "";

    for (let n in nodes) {

        html += `
        <div class="cell" style="opacity:${Math.min(1, nodes[n].e)}">
            <div class="title">${n}</div>
            <div class="small">
                energy: ${nodes[n].e.toFixed(2)}<br>
                valence: ${nodes[n].val.toFixed(2)}
            </div>
        </div>
        `;
    }

    document.getElementById("output").innerHTML =
        readout(active, m) +
        "<br>mode: " + m +
        "<br>history: " + history.length;

    box.innerHTML = html;
}

// =========================
// DRAW
// =========================
function draw() {
    const c = document.getElementById("graphCanvas");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,800,280);

    let keys = Object.keys(nodes);
    let cx = 400, cy = 140, r = 100;

    keys.forEach((n,i)=>{
        let angle = (i/keys.length)*Math.PI*2;
        let x = cx + Math.cos(angle)*r;
        let y = cy + Math.sin(angle)*r;

        ctx.beginPath();
        ctx.fillStyle = nodes[n].val > 0 ? "#00ffcc" : "#ff3366";
        ctx.arc(x, y, 10 + nodes[n].e*5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, x+10, y);
    });
}

</script>

</body>
</html>
