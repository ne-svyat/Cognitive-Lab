<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.2</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 20px;
    flex-wrap: wrap;
}

.cell {
    width: 160px;
    min-height: 120px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 40px;
    text-align: center;
    color: #ffcc00;
}
</style>

</head>

<body>

<div id="core">CORE: Cognitive Router + Field System</div>

<div id="inputBox">
    <input id="query" placeholder="Ask something... (memory, logic, compress)" />
    <button onclick="runRouter()">Run</button>
</div>

<div class="container">
    <div class="cell">
        <div class="title">Memory Cell</div>
        <div class="small">Concepts: 12<br>Cache: 4KB</div>
    </div>

    <div class="cell">
        <div class="title">Logic Cell</div>
        <div class="small">Rules: 8<br>Confidence: 0.73</div>
    </div>

    <div class="cell">
        <div class="title">Compression Cell</div>
        <div class="small">Graphs: 5<br>Efficiency: 81%</div>
    </div>
</div>

<div id="output">Waiting for input...</div>

<script>

const cells = {
    Memory: { activation: 0, connections: ["Logic", "Compression"] },
    Logic: { activation: 0, connections: ["Memory", "Compression"] },
    Compression: { activation: 0, connections: ["Memory"] }
};

function reset() {
    for (let c in cells) {
        cells[c].activation = 0;
    }
}

function spreadActivation(node, intensity) {
    if (intensity < 0.2) return;

    cells[node].activation = Math.max(cells[node].activation, intensity);

    cells[node].connections.forEach(n => {
        spreadActivation(n, intensity * 0.5);
    });
}

function runRouter() {
    const text = document.getElementById("query").value.toLowerCase();

    reset();

    // ROUTER (rule-based semantic mapping)
    let activated = [];

    if (text.includes("memory")) {
        spreadActivation("Memory", 1);
        activated.push("Memory");
    }

    if (text.includes("logic") || text.includes("reason")) {
        spreadActivation("Logic", 1);
        activated.push("Logic");
    }

    if (text.includes("compress") || text.includes("optimize")) {
        spreadActivation("Compression", 1);
        activated.push("Compression");
    }

    // fallback routing
    if (activated.length === 0) {
        spreadActivation("Memory", 0.4);
    }

    render(text, activated);
}

function render(text, activated) {
    const output = document.getElementById("output");

    let graph = "";

    for (let c in cells) {
        const a = cells[c].activation;

        graph += `
        <div class="cell" style="
            background: rgba(0,255,200,${a * 0.4});
            transform: scale(${1 + a * 0.2});
            border-color: rgba(0,255,200,${a});
        ">
            <div class="title">${c}</div>
            <div class="small">
                activation: ${a.toFixed(2)}<br>
                links: ${cells[c].connections.join(", ")}
            </div>
        </div>
        `;
    }

    output.innerHTML = `
        <div><b>INPUT:</b> ${text}</div>
        <div><b>ACTIVATED:</b> ${activated.join(", ") || "fallback (Memory)"}</div>
        <br>
        <div class="container">${graph}</div>
    `;
}

</script>

</body>
</html>
