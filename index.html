<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.5</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 20px;
    flex-wrap: wrap;
}

.cell {
    width: 160px;
    min-height: 120px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 40px;
    text-align: center;
    color: #ffcc00;
}
</style>

</head>

<body>

<div id="core">CORE: Cognitive Router + Learning Field</div>

<div id="inputBox">
    <input id="query" placeholder="Ask something... (memory, logic, compress, cryptography)" />
    <button onclick="runRouter()">Run</button>
</div>

<div class="container">
    <div class="cell">
        <div class="title">Memory Cell</div>
        <div class="small">Concepts: 12<br>Cache: 4KB</div>
    </div>

    <div class="cell">
        <div class="title">Logic Cell</div>
        <div class="small">Rules: 8<br>Confidence: 0.73</div>
    </div>

    <div class="cell">
        <div class="title">Compression Cell</div>
        <div class="small">Graphs: 5<br>Efficiency: 81%</div>
    </div>
</div>

<div id="output">Waiting for input...</div>

<script>

const cells = {
    Memory: { activation: 0, connections: { Logic: 0.5, Compression: 0.3 } },
    Logic: { activation: 0, connections: { Memory: 0.5, Compression: 0.4 } },
    Compression: { activation: 0, connections: { Memory: 0.3 } }
};

const conceptMap = {
    memory: ["Memory"],
    remember: ["Memory"],

    logic: ["Logic"],
    reason: ["Logic"],
    think: ["Logic"],

    compress: ["Compression"],
    optimize: ["Compression"],

    cryptography: ["Logic", "Memory"],
    encryption: ["Logic"],
    security: ["Logic", "Compression"],
    key: ["Memory", "Logic"]
};

let experienceLog = [];

// reset activation
function reset() {
    for (let c in cells) {
        cells[c].activation = 0;
    }
}

// propagation with weights
function spreadActivation(node, intensity, visited = new Set()) {
    if (intensity < 0.15) return;
    if (visited.has(node)) return;

    visited.add(node);

    cells[node].activation = Math.max(
        cells[node].activation,
        intensity
    );

    const connections = cells[node].connections;

    for (let target in connections) {
        const weight = connections[target];

        spreadActivation(
            target,
            intensity * weight,
            visited
        );
    }
}

// learning system
function learn(concepts) {
    if (concepts.length < 2) return;

    for (let i = 0; i < concepts.length; i++) {
        for (let j = i + 1; j < concepts.length; j++) {

            const a = concepts[i];
            const b = concepts[j];

            if (!cells[a].connections[b]) {
                cells[a].connections[b] = 0.2;
            } else {
                cells[a].connections[b] += 0.1;
            }

            if (!cells[b].connections[a]) {
                cells[b].connections[a] = 0.2;
            } else {
                cells[b].connections[a] += 0.1;
            }
        }
    }
}

// forgetting system
function decay() {
    for (let c in cells) {
        const connections = cells[c].connections;

        for (let target in connections) {
            connections[target] -= 0.02;

            if (connections[target] <= 0.05) {
                delete connections[target];
            }
        }
    }
}

// router
function runRouter() {
    const text = document.getElementById("query").value.toLowerCase();

    reset();

    let activated = new Set();

    for (let key in conceptMap) {
        if (text.includes(key)) {
            conceptMap[key].forEach(c => activated.add(c));
        }
    }

    if (activated.size === 0) {
        activated.add("Memory");
    }

    const concepts = Array.from(activated);

    concepts.forEach(c => {
        spreadActivation(c, 1);
    });

    experienceLog.push({ text, concepts });

    learn(concepts);
    decay();

    render(text, concepts);
}

// render
function render(text, concepts) {
    const output = document.getElementById("output");

    let graph = "";

    for (let c in cells) {
        const a = cells[c].activation;

        let links = Object.entries(cells[c].connections)
            .map(([k, v]) => `${k}:${v.toFixed(2)}`)
            .join(" | ");

        graph += `
        <div class="cell" style="
            background: rgba(0,255,200,${a * 0.4});
            transform: scale(${1 + a * 0.2});
            border-color: rgba(0,255,200,${a});
        ">
            <div class="title">${c}</div>
            <div class="small">
                activation: ${a.toFixed(2)}<br>
                links: ${links || "none"}
            </div>
        </div>
        `;
    }

    output.innerHTML = `
        <div><b>INPUT:</b> ${text}</div>
        <div><b>CONCEPTS:</b> ${concepts.join(", ")}</div>
        <div><b>MEMORY SIZE:</b> ${experienceLog.length}</div>
        <br>
        <div class="container">${graph}</div>
    `;
}

</script>

</body>
</html>
