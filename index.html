<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.9 — Memory Graph</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

.cell {
    width: 180px;
    min-height: 120px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #333;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    color: #aaa;
    margin-top: 8px;
}

/* ========================= */
/* GRAPH VISUALIZATION */
/* ========================= */
#graphCanvas {
    display: block;
    margin: 30px auto;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
}
</style>

</head>

<body>

<div id="core">CORE: Cognitive Memory Graph v0.9</div>

<div id="inputBox">
    <input id="query" placeholder="Try: cryptography, memory, compression..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="300"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center; margin-top:20px;"></div>

<script>

// ===============================
// GRAPH CORE
// ===============================
let graph = {
    Memory: { act: 0, links: { Logic: 0.6, Compression: 0.5 }, importance: 1 },
    Logic: { act: 0, links: { Memory: 0.6, Compression: 0.5 }, importance: 1 },
    Compression: { act: 0, links: { Memory: 0.5, Logic: 0.5 }, importance: 1 }
};

// ===============================
// MEMORY LOG
// ===============================
let memory = [];

// ===============================
// CLEANER
// ===============================
const stopwords = new Set([
    "my","new","idea","system","about","the","a","an","is","are","to","of","and"
]);

function normalize(w) {
    w = w.toLowerCase();

    if (stopwords.has(w)) return null;

    if (w.includes("logic") || w.includes("reason")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";
    if (w.includes("memory") || w.includes("remember")) return "Memory";

    if (w.includes("crypt") || w.includes("encrypt") || w.includes("security")) return "Logic";

    return null;
}

// ===============================
// RESET
// ===============================
function reset() {
    for (let n in graph) graph[n].act = 0;
}

// ===============================
// SPREAD (activation)
// ===============================
function spread(node, intensity, visited = new Set()) {
    if (intensity < 0.15) return;
    if (visited.has(node)) return;

    visited.add(node);

    graph[node].act = Math.max(graph[node].act, intensity);

    for (let l in graph[node].links) {
        spread(l, intensity * graph[node].links[l], visited);
    }
}

// ===============================
// LEARNING
// ===============================
function learn(concepts) {
    for (let i = 0; i < concepts.length; i++) {
        for (let j = i + 1; j < concepts.length; j++) {

            let a = concepts[i];
            let b = concepts[j];

            graph[a].links[b] = (graph[a].links[b] || 0.3) + 0.05;
            graph[b].links[a] = (graph[b].links[a] || 0.3) + 0.05;

            graph[a].importance += 0.02;
            graph[b].importance += 0.02;
        }
    }
}

// ===============================
// FORGETTING
// ===============================
function decay() {
    for (let n in graph) {
        for (let l in graph[n].links) {
            graph[n].links[l] -= 0.01;

            if (graph[n].links[l] < 0.2) {
                delete graph[n].links[l];
            }
        }

        // importance decay
        graph[n].importance *= 0.999;
    }
}

// ===============================
// AUTO CONCEPTS
// ===============================
function maybeCreate(text, concepts) {
    if (text.length < 10) return;

    let name = text.split(" ")[0];

    if (!graph[name]) {
        graph[name] = { act: 0, links: {}, importance: 0.5 };
    }

    for (let c of concepts) {
        graph[name].links[c] = 0.3;
        graph[c].links[name] = 0.3;
    }
}

// ===============================
// ROUTER
// ===============================
function run() {
    let text = document.getElementById("query").value;

    reset();

    let words = text.split(" ");

    let concepts = new Set();

    for (let w of words) {
        let c = normalize(w);
        if (c) concepts.add(c);
    }

    if (concepts.size === 0) concepts.add("Memory");

    let arr = Array.from(concepts);

    for (let c of arr) spread(c, 1);

    learn(arr);
    decay();
    maybeCreate(text, arr);

    memory.push({ text, concepts: arr });

    render(arr);
    drawGraph();
}

// ===============================
// RENDER NODES
// ===============================
function render(concepts) {
    let box = document.getElementById("cells");

    let html = "";

    for (let n in graph) {
        html += `
        <div class="cell" style="
            background: rgba(0,255,200,${graph[n].act * 0.4});
            transform: scale(${1 + graph[n].act * 0.2});
        ">
            <div class="title">${n}</div>
            <div class="small">
                act: ${graph[n].act.toFixed(2)}<br>
                imp: ${graph[n].importance.toFixed(2)}<br>
                links: ${Object.keys(graph[n].links).join(", ") || "none"}
            </div>
        </div>
        `;
    }

    box.innerHTML = html;

    document.getElementById("output").innerHTML =
        "CONCEPTS: " + concepts.join(", ") +
        "<br>MEMORY: " + memory.length +
        "<br>NODES: " + Object.keys(graph).length;
}

// ===============================
// GRAPH VISUALIZATION (simple)
// ===============================
function drawGraph() {
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,800,300);

    let nodes = Object.keys(graph);
    let pos = {};

    // layout circle
    let radius = 120;
    let cx = 400, cy = 150;

    nodes.forEach((n,i)=>{
        let angle = (i / nodes.length) * Math.PI * 2;
        pos[n] = {
            x: cx + Math.cos(angle)*radius,
            y: cy + Math.sin(angle)*radius
        };
    });

    // links
    ctx.strokeStyle = "rgba(0,255,200,0.3)";
    for (let a in graph) {
        for (let b in graph[a].links) {
            if (pos[a] && pos[b]) {
                ctx.beginPath();
                ctx.moveTo(pos[a].x, pos[a].y);
                ctx.lineTo(pos[b].x, pos[b].y);
                ctx.stroke();
            }
        }
    }

    // nodes
    for (let n in pos) {
        ctx.beginPath();
        ctx.fillStyle = "#00ffcc";
        ctx.arc(pos[n].x, pos[n].y, 10 + graph[n].act*5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, pos[n].x + 10, pos[n].y);
    }
}

</script>

</body>
</html>
