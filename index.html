<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.6</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 20px;
    flex-wrap: wrap;
}

.cell {
    width: 160px;
    min-height: 120px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 40px;
    text-align: center;
    color: #ffcc00;
}
</style>

</head>

<body>

<div id="core">CORE: Embedding Router (v0.6)</div>

<div id="inputBox">
    <input id="query" placeholder="Ask anything..." />
    <button onclick="runRouter()">Run</button>
</div>

<div class="container">
    <div class="cell">
        <div class="title">Memory Cell</div>
        <div class="small">adaptive storage</div>
    </div>

    <div class="cell">
        <div class="title">Logic Cell</div>
        <div class="small">reasoning layer</div>
    </div>

    <div class="cell">
        <div class="title">Compression Cell</div>
        <div class="small">optimization layer</div>
    </div>
</div>

<div id="output">Waiting for input...</div>

<script>

const cells = {
    Memory: { activation: 0, connections: { Logic: 0.5, Compression: 0.3 } },
    Logic: { activation: 0, connections: { Memory: 0.5, Compression: 0.4 } },
    Compression: { activation: 0, connections: { Memory: 0.3 } }
};

let experience = [];

// reset
function reset() {
    for (let c in cells) {
        cells[c].activation = 0;
    }
}

// fuzzy similarity (VERY simplified embedding idea)
function similarity(word, cell) {
    word = word.toLowerCase();
    cell = cell.toLowerCase();

    let score = 0;

    // shared letters heuristic
    for (let i = 0; i < word.length; i++) {
        if (cell.includes(word[i])) {
            score += 0.1;
        }
    }

    // experience boost
    for (let exp of experience) {
        if (exp.concepts.includes(cell)) {
            if (exp.text.includes(word)) {
                score += 0.3;
            }
        }
    }

    return score;
}

// propagation
function spread(node, intensity, visited = new Set()) {
    if (intensity < 0.15) return;
    if (visited.has(node)) return;

    visited.add(node);

    cells[node].activation = Math.max(
        cells[node].activation,
        intensity
    );

    const links = cells[node].connections;

    for (let target in links) {
        spread(target, intensity * links[target], visited);
    }
}

// router (NO conceptMap anymore)
function runRouter() {
    const text = document.getElementById("query").value.toLowerCase();

    reset();

    const words = text.split(" ");

    let scores = {
        Memory: 0,
        Logic: 0,
        Compression: 0
    };

    for (let w of words) {
        scores.Memory += similarity(w, "Memory");
        scores.Logic += similarity(w, "Logic");
        scores.Compression += similarity(w, "Compression");
    }

    let activated = [];

    for (let c in scores) {
        if (scores[c] > 0.2) {
            activated.push(c);
        }
    }

    if (activated.length === 0) {
        activated = ["Memory"];
    }

    for (let c of activated) {
        spread(c, 1);
    }

    experience.push({
        text,
        concepts: activated
    });

    render(text, activated, scores);
}

// render
function render(text, concepts, scores) {
    const output = document.getElementById("output");

    let graph = "";

    for (let c in cells) {
        const a = cells[c].activation;

        graph += `
        <div class="cell" style="
            background: rgba(0,255,200,${a * 0.4});
            transform: scale(${1 + a * 0.2});
        ">
            <div class="title">${c}</div>
            <div class="small">
                activation: ${a.toFixed(2)}<br>
                score: ${scores[c].toFixed(2)}
            </div>
        </div>
        `;
    }

    output.innerHTML = `
        <div><b>INPUT:</b> ${text}</div>
        <div><b>ACTIVATED:</b> ${concepts.join(", ")}</div>
        <div><b>EXPERIENCE:</b> ${experience.length}</div>
        <br>
        <div class="container">${graph}</div>
    `;
}

</script>

</body>
</html>
