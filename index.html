<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.2</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 20px;
    flex-wrap: wrap;
}

.cell {
    width: 160px;
    min-height: 120px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    transition: 0.2s;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 40px;
    text-align: center;
    color: #ffcc00;
}
</style>

</head>

<body>

<div id="core">CORE: Cognitive Router + Field System</div>

<div id="inputBox">
    <input id="query" placeholder="Ask something... (memory, logic, compress)" />
    <button onclick="runRouter()">Run</button>
</div>

<div class="container">
    <div class="cell">
        <div class="title">Memory Cell</div>
        <div class="small">Concepts: 12<br>Cache: 4KB</div>
    </div>

    <div class="cell">
        <div class="title">Logic Cell</div>
        <div class="small">Rules: 8<br>Confidence: 0.73</div>
    </div>

    <div class="cell">
        <div class="title">Compression Cell</div>
        <div class="small">Graphs: 5<br>Efficiency: 81%</div>
    </div>
</div>

<div id="output">Waiting for input...</div>

<script>

const cells = {
    Memory: { activation: 0, connections: ["Logic", "Compression"] },
    Logic: { activation: 0, connections: ["Memory", "Compression"] },
    Compression: { activation: 0, connections: ["Memory"] }
};

// 👉 SEMANTIC GRAPH (новый слой)
const conceptMap = {
    "memory": ["Memory"],
    "remember": ["Memory"],

    "logic": ["Logic"],
    "reason": ["Logic"],
    "think": ["Logic"],

    "compress": ["Compression"],
    "optimize": ["Compression"],

    // 🔥 новая семантика
    "cryptography": ["Logic", "Memory"],
    "encryption": ["Logic"],
    "security": ["Logic", "Compression"],
    "key": ["Memory", "Logic"],
    "data": ["Memory", "Compression"]
};

function reset() {
    for (let c in cells) {
        cells[c].activation = 0;
    }
}

// propagation
function spreadActivation(node, intensity) {
    if (intensity < 0.2) return;

    cells[node].activation = Math.max(
        cells[node].activation,
        intensity
    );

    cells[node].connections.forEach(n => {
        spreadActivation(n, intensity * 0.55);
    });
}

// 👉 SEMANTIC ROUTER
function runRouter() {
    const text = document.getElementById("query").value.toLowerCase();
    reset();

    let activated = new Set();

    // 1. ищем концепты
    for (let key in conceptMap) {
        if (text.includes(key)) {
            conceptMap[key].forEach(c => activated.add(c));
        }
    }

    // 2. если ничего не найдено
    if (activated.size === 0) {
        activated.add("Memory");
    }

    // 3. активируем граф
    activated.forEach(c => {
        spreadActivation(c, 1);
    });

    render(text, Array.from(activated));
}

function render(text, activated) {
    const output = document.getElementById("output");

    let graph = "";

    for (let c in cells) {
        const a = cells[c].activation;

        graph += `
        <div class="cell" style="
            background: rgba(0,255,200,${a * 0.4});
            transform: scale(${1 + a * 0.2});
            border-color: rgba(0,255,200,${a});
        ">
            <div class="title">${c}</div>
            <div class="small">
                activation: ${a.toFixed(2)}<br>
                links: ${cells[c].connections.join(", ")}
            </div>
        </div>
        `;
    }

    output.innerHTML = `
        <div><b>INPUT:</b> ${text}</div>
        <div><b>CONCEPTS:</b> ${activated.join(", ")}</div>
        <br>
        <div class="container">${graph}</div>
    `;
}

</script>

</body>
</html>
