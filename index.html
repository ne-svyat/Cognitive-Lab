<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab v0.10 — Clean Core</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

.cell {
    width: 200px;
    min-height: 140px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #333;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    color: #aaa;
    margin-top: 8px;
}

#graphCanvas {
    display: block;
    margin: 30px auto;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="core">CORE: Cognitive Memory Graph v0.10 CLEAN</div>

<div id="inputBox">
    <input id="query" placeholder="Try: cryptography, memory, compression..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="300"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center;margin-top:20px;"></div>

<script>

// =========================
// GRAPH WITH NODE STATE
// =========================
let graph = {
    Memory: {
        act: 0,
        links: { Logic: 0.6, Compression: 0.5 },
        energy: 0.5,
        confidence: 1,
        stability: 1
    },
    Logic: {
        act: 0,
        links: { Memory: 0.6, Compression: 0.5 },
        energy: 0.5,
        confidence: 1,
        stability: 1
    },
    Compression: {
        act: 0,
        links: { Memory: 0.5, Logic: 0.5 },
        energy: 0.5,
        confidence: 1,
        stability: 1
    }
};

let memory = [];

// =========================
// CLEANING LAYER
// =========================
function cleanWord(w) {
    w = w.toLowerCase();

    const stop = new Set([
        "my","new","idea","system","about","the","a","an","is","are","to","of","and"
    ]);

    if (stop.has(w)) return null;
    if (w.length < 3) return null;
    if (/[0-9]/.test(w)) return null;

    return w;
}

// =========================
// CONCEPT MAPPING (merge logic)
// =========================
function normalizeConcept(w) {
    if (w.includes("logic") || w.includes("reason") || w.includes("crypt")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";
    if (w.includes("memory") || w.includes("remember")) return "Memory";
    return null;
}

// =========================
// STABILITY CHECK
// =========================
function isStable(node) {
    return (
        graph[node].confidence > 0.3 &&
        graph[node].stability > 0.2
    );
}

// =========================
// RESET ACTIVITY
// =========================
function resetAct() {
    for (let n in graph) graph[n].act = 0;
}

// =========================
// ACTIVATION SPREAD
// =========================
function spread(node, intensity, visited = new Set()) {
    if (!graph[node]) return;
    if (intensity < 0.15) return;
    if (visited.has(node)) return;

    visited.add(node);

    graph[node].act = Math.max(graph[node].act, intensity);
    graph[node].energy = Math.min(1, graph[node].energy + intensity * 0.1);

    for (let l in graph[node].links) {
        spread(l, intensity * graph[node].links[l], visited);
    }
}

// =========================
// MERGE LINKS + LEARNING
// =========================
function learn(concepts) {
    for (let i = 0; i < concepts.length; i++) {
        for (let j = i + 1; j < concepts.length; j++) {

            let a = concepts[i];
            let b = concepts[j];

            if (!graph[a].links[b]) graph[a].links[b] = 0.3;
            if (!graph[b].links[a]) graph[b].links[a] = 0.3;

            graph[a].links[b] += 0.05;
            graph[b].links[a] += 0.05;

            graph[a].confidence = Math.min(1, graph[a].confidence + 0.02);
            graph[b].confidence = Math.min(1, graph[b].confidence + 0.02);

            graph[a].stability = Math.min(1, graph[a].stability + 0.01);
            graph[b].stability = Math.min(1, graph[b].stability + 0.01);
        }
    }
}

// =========================
// DECAY (forgetting)
// =========================
function decay() {
    for (let n in graph) {

        graph[n].energy *= 0.99;
        graph[n].stability *= 0.999;

        for (let l in graph[n].links) {
            graph[n].links[l] -= 0.005;

            if (graph[n].links[l] < 0.15) {
                delete graph[n].links[l];
            }
        }

        graph[n].confidence *= 0.999;
    }
}

// =========================
// MERGE DUPLICATES
// =========================
function mergeConcept(c) {
    let norm = normalizeConcept(c);
    return norm || c;
}

// =========================
// PIPELINE CORE (v0.10)
// =========================
function run() {
    let text = document.getElementById("query").value;

    resetAct();

    let rawWords = text.split(" ");
    let concepts = [];

    // 1. CLEAN + MAP
    for (let w of rawWords) {
        let c = cleanWord(w);
        if (!c) continue;

        c = mergeConcept(c);

        if (!concepts.includes(c)) concepts.push(c);
    }

    if (concepts.length === 0) concepts = ["Memory"];

    // 2. FILTER OUT WEAK NOISE
    concepts = concepts.filter(c => {
        if (!graph[c]) graph[c] = {
            act: 0,
            links: {},
            energy: 0.4,
            confidence: 0.5,
            stability: 0.5
        };
        return true;
    });

    // 3. SPREAD
    for (let c of concepts) {
        spread(c, 1);
    }

    // 4. LEARN
    learn(concepts);

    // 5. DECAY
    decay();

    // 6. MEMORY LOG
    memory.push({ text, concepts });

    render(concepts);
    drawGraph();
}

// =========================
// RENDER
// =========================
function render(concepts) {
    let box = document.getElementById("cells");

    let html = "";

    for (let n in graph) {

        if (!isStable(n)) continue;

        html += `
        <div class="cell" style="
            background: rgba(0,255,200,${graph[n].act * 0.35});
        ">
            <div class="title">${n}</div>
            <div class="small">
                act: ${graph[n].act.toFixed(2)}<br>
                energy: ${graph[n].energy.toFixed(2)}<br>
                confidence: ${graph[n].confidence.toFixed(2)}<br>
                stability: ${graph[n].stability.toFixed(2)}<br>
                links: ${Object.keys(graph[n].links).join(", ") || "none"}
            </div>
        </div>
        `;
    }

    box.innerHTML = html;

    document.getElementById("output").innerHTML =
        "CONCEPTS: " + concepts.join(", ") +
        "<br>MEMORY: " + memory.length +
        "<br>NODES: " + Object.keys(graph).length;
}

// =========================
// GRAPH DRAW
// =========================
function drawGraph() {
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,800,300);

    let nodes = Object.keys(graph);
    let pos = {};

    let cx = 400, cy = 150;
    let radius = 120;

    nodes.forEach((n,i)=>{
        let angle = (i / nodes.length) * Math.PI * 2;
        pos[n] = {
            x: cx + Math.cos(angle)*radius,
            y: cy + Math.sin(angle)*radius
        };
    });

    ctx.strokeStyle = "rgba(0,255,200,0.25)";
    for (let a in graph) {
        for (let b in graph[a].links) {
            if (pos[a] && pos[b]) {
                ctx.beginPath();
                ctx.moveTo(pos[a].x, pos[a].y);
                ctx.lineTo(pos[b].x, pos[b].y);
                ctx.stroke();
            }
        }
    }

    for (let n in pos) {
        ctx.beginPath();
        ctx.fillStyle = "#00ffcc";
        ctx.arc(
            pos[n].x,
            pos[n].y,
            8 + (graph[n].act || 0) * 5,
            0,
            Math.PI*2
        );
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, pos[n].x + 10, pos[n].y);
    }
}

</script>

</body>
</html>
