<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Field v0.14 — Multi-Step Mind</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 15px;
    color: #00ffcc;
}

#inputBox {
    text-align: center;
    margin-top: 15px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.cell {
    width: 200px;
    min-height: 110px;
    background: #1c1c1c;
    border-radius: 12px;
    padding: 10px;
}

.title {
    color: #00ffcc;
}

.small {
    font-size: 12px;
    color: #aaa;
}

#graphCanvas {
    display: block;
    margin: 20px auto;
    background: #111;
}
</style>
</head>

<body>

<div id="core">v0.14 — Multi-Step Cognitive Mind</div>

<div id="inputBox">
    <input id="query" placeholder="Try: memory logic compression..." />
    <button onclick="run()">Run</button>
</div>

<canvas id="graphCanvas" width="800" height="280"></canvas>

<div class="container" id="cells"></div>

<div id="output" style="text-align:center;margin-top:15px;"></div>

<script>

// =========================
// NODES
// =========================
let nodes = {
    Memory: { e: 0, val: 0.3 },
    Logic: { e: 0, val: 0.5 },
    Compression: { e: 0, val: 0.4 }
};

let history = [];

// =========================
// MAP
// =========================
function map(w) {
    w = w.toLowerCase();

    if (w.includes("memory") || w.includes("remember")) return "Memory";
    if (w.includes("logic") || w.includes("reason") || w.includes("crypt")) return "Logic";
    if (w.includes("compress") || w.includes("optimize")) return "Compression";

    return null;
}

// =========================
// PHASE 1 — ASSUMPTION
// =========================
function phase1(active) {

    let seed = active[0];

    for (let n of active) {
        nodes[n].e += 1;

        if (n === seed) {
            nodes[n].val += 0.02;
        }
    }

    return seed;
}

// =========================
// PHASE 2 — CRITIC PASS
// =========================
function phase2(active) {

    for (let a of active) {
        for (let b of active) {
            if (a !== b) {
                nodes[b].e -= 0.4;
                nodes[b].val -= 0.02;
            }
        }
    }
}

// =========================
// PHASE 3 — REINFORCEMENT
// =========================
function phase3() {

    for (let n in nodes) {

        if (nodes[n].e > 1) {
            nodes[n].e *= 1.1;
            nodes[n].val += 0.03;
        }
    }
}

// =========================
// DECISION
// =========================
function decide() {

    let best = null;
    let bestScore = -Infinity;

    for (let n in nodes) {

        let score = nodes[n].e + nodes[n].val * 0.5;

        if (score > bestScore) {
            bestScore = score;
            best = n;
        }
    }

    return best;
}

// =========================
// COLLAPSE
// =========================
function collapse(winner) {

    for (let n in nodes) {
        if (n !== winner) {
            nodes[n].e *= 0.5;
        }
    }

    nodes[winner].e *= 1.2;
}

// =========================
// STABILITY
// =========================
function stability() {
    let sum = 0;
    for (let n in nodes) sum += Math.abs(nodes[n].e);
    return sum / Object.keys(nodes).length;
}

// =========================
// READOUT
// =========================
function readout(winner) {

    if (winner === "Memory") return "Answer: retrieval-based reasoning";
    if (winner === "Logic") return "Answer: structured logical inference";
    if (winner === "Compression") return "Answer: simplified model selection";

    return "Answer: unstable cognition";
}

// =========================
// RUN
// =========================
function run() {

    let text = document.getElementById("query").value;
    let words = text.split(" ");

    let active = [];

    for (let w of words) {
        let m = map(w);
        if (m && !active.includes(m)) active.push(m);
    }

    if (active.length === 0) active = ["Memory"];

    // 🧠 MULTI PHASE THINKING
    let seed = phase1(active);
    phase2(active);
    phase3();

    let winner = decide();

    collapse(winner);

    history.push({ text, winner, seed });

    render(winner);
    draw();
}

// =========================
// RENDER
// =========================
function render(winner) {

    let box = document.getElementById("cells");

    let html = "";

    for (let n in nodes) {

        html += `
        <div class="cell">
            <div class="title">${n}</div>
            <div class="small">
                energy: ${nodes[n].e.toFixed(2)}<br>
                valence: ${nodes[n].val.toFixed(2)}
            </div>
        </div>
        `;
    }

    document.getElementById("output").innerHTML =
        readout(winner) +
        "<br>winner: " + winner +
        "<br>history: " + history.length;

    box.innerHTML = html;
}

// =========================
// DRAW
// =========================
function draw() {

    const c = document.getElementById("graphCanvas");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,800,280);

    let keys = Object.keys(nodes);

    let cx = 400, cy = 140, r = 100;

    keys.forEach((n,i)=>{
        let angle = (i/keys.length)*Math.PI*2;
        let x = cx + Math.cos(angle)*r;
        let y = cy + Math.sin(angle)*r;

        ctx.beginPath();
        ctx.fillStyle = "#00ffcc";
        ctx.arc(x, y, 10 + nodes[n].e*5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillText(n, x+10, y);
    });
}

</script>

</body>
</html>
