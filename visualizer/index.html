<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cognitive Lab - Visualizer v0</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

#core {
    text-align: center;
    margin-top: 40px;
    font-size: 22px;
    color: #00ffcc;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 60px;
    gap: 20px;
}

.cell {
    width: 160px;
    height: 160px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.cell:hover {
    transform: scale(1.05);
    border-color: #00ffcc;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

.small {
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

#output {
    margin-top: 50px;
    text-align: center;
    color: #ffcc00;
}
</style>
</head>
<body>

<div id="core">CORE: Cognitive Router</div>

<div class="container">

<div class="cell" onclick="activate('Memory')">
<div class="title">Memory Cell</div>
<div class="small">Concepts: 12<br>Cache: 4KB</div>
</div>

<div class="cell" onclick="activate('Logic')">
<div class="title">Logic Cell</div>
<div class="small">Rules: 8<br>Confidence: 0.73</div>
</div>

<div class="cell" onclick="activate('Compression')">
<div class="title">Compression Cell</div>
<div class="small">Graphs: 5<br>Efficiency: 81%</div>
</div>

</div>

<div id="output">Click a Cell to activate Cognitive Field</div>

<script>
const cells = {
    Memory: {
        activation: 0,
        connections: ["Logic", "Compression"]
    },
    Logic: {
        activation: 0,
        connections: ["Memory", "Compression"]
    },
    Compression: {
        activation: 0,
        connections: ["Memory"]
    }
};

function activate(cellName) {
    // 1. reset
    for (let c in cells) {
        cells[c].activation = 0;
    }

    // 2. activate main node
    spreadActivation(cellName, 1);

    render(cellName);
}

function spreadActivation(cellName, intensity) {
    if (intensity < 0.2) return;

    cells[cellName].activation = Math.max(
        cells[cellName].activation,
        intensity
    );

    // spread to neighbors
    cells[cellName].connections.forEach(neighbor => {
        spreadActivation(neighbor, intensity * 0.5);
    });
}

function render(active) {
    const output = document.getElementById("output");

    let graph = "";

    for (let c in cells) {
        const a = cells[c].activation;

        graph += `
        <div style="
            margin:10px;
            padding:12px;
            border-radius:10px;
            border:1px solid #333;
            background: rgba(0,255,200,${a * 0.4});
            transform: scale(${1 + a * 0.2});
            transition: 0.2s;
        ">
            <b>${c}</b><br>
            activation: ${a.toFixed(2)}
        </div>
        `;
    }

    output.innerHTML = `
        <b>ACTIVE FIELD: ${active}</b><br><br>
        <div style="display:flex;justify-content:center;gap:10px;">
            ${graph}
        </div>
    `;
}
</script>

</body>
</html>
